<svg width="1100" height="620" viewBox="0 0 1100 620"
     xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif">

<defs>
  <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
    <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.07"/>
  </filter>
  <filter id="shadow-sm" x="-4%" y="-4%" width="108%" height="114%">
    <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.06"/>
  </filter>
  <filter id="shadow-highlight" x="-4%" y="-4%" width="108%" height="116%">
    <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0891b2" flood-opacity="0.12"/>
  </filter>
</defs>

<!-- Canvas -->
<rect width="1100" height="620" fill="#ffffff"/>

<!-- Kopfzeile -->
<text x="550" y="30" text-anchor="middle"
      font-size="10" font-weight="700" letter-spacing="0.14em"
      fill="#bbb">WETTBEWERBSPOSITIONIERUNG · ANBIETER-LANDSCHAFT · by viSales</text>
<rect x="20" y="38" width="1060" height="2" rx="1" fill="#f97316" opacity="0.25"/>

<!-- Titel -->
<text x="550" y="72" text-anchor="middle"
      font-size="22" font-weight="700" letter-spacing="-0.01em" fill="#1a1a1a">Das Shortlist-Schlachtfeld</text>
<text x="550" y="94" text-anchor="middle"
      font-size="12" fill="#888">Wenn Entscheider Komplexität bewerten, vergleichen sie verschiedene Anbieter-Archetypen. viSales gewinnt,</text>
<text x="550" y="110" text-anchor="middle"
      font-size="12" fill="#888">indem es „Visual Wow" durch „System Understanding" ersetzt — den wahren Treiber von B2B-Entscheidungen.</text>

<!-- ==================== LINKE SEITE: SPIDER CHART ==================== -->

<!-- Legende -->
<rect x="60" y="138" width="12" height="12" rx="2" fill="#0891b2" opacity="0.25" stroke="#0891b2" stroke-width="1.5"/>
<text x="78" y="148" font-size="10" font-weight="600" fill="#555">viSales</text>

<rect x="140" y="138" width="12" height="12" rx="2" fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="158" y="148" font-size="10" font-weight="600" fill="#555">VR/AR-Agentur</text>

<rect x="264" y="138" width="12" height="12" rx="2" fill="none" stroke="#ccc" stroke-width="1.5"/>
<text x="282" y="148" font-size="10" font-weight="600" fill="#555">CPQ-Anbieter</text>

<!-- Spider Chart -->
<!-- Zentrum: 280, 370 | Radius: 180 -->
<!-- 5 Achsen (Pentagon, Start oben, 72° Abstände):
     Systemverständnis (oben):            280, 190
     Vertriebsprozess-Alignment (re-oben): 451, 314
     Immersiver Wow-Faktor (re-unten):     386, 516
     Fotorealistische Details (li-unten):  174, 516
     Pricing/Teile-Logik (li-oben):        109, 314
-->

<!-- Gitter-Ringe -->
<polygon points="280,190 451,314 386,516 174,516 109,314"
         fill="none" stroke="#e8e8e8" stroke-width="0.8"/>
<polygon points="280,250 394,333 323,467 237,467 166,333"
         fill="none" stroke="#e8e8e8" stroke-width="0.8"/>
<polygon points="280,310 337,352 302,418 258,418 223,352"
         fill="none" stroke="#e8e8e8" stroke-width="0.8"/>

<!-- Achsenlinien -->
<line x1="280" y1="370" x2="280" y2="190" stroke="#e8e8e8" stroke-width="0.8"/>
<line x1="280" y1="370" x2="451" y2="314" stroke="#e8e8e8" stroke-width="0.8"/>
<line x1="280" y1="370" x2="386" y2="516" stroke="#e8e8e8" stroke-width="0.8"/>
<line x1="280" y1="370" x2="174" y2="516" stroke="#e8e8e8" stroke-width="0.8"/>
<line x1="280" y1="370" x2="109" y2="314" stroke="#e8e8e8" stroke-width="0.8"/>

<!-- Achsen-Labels -->
<text x="280" y="175" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a1a">System-</text>
<text x="280" y="188" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a1a">verständnis</text>

<text x="462" y="310" text-anchor="start" font-size="11" font-weight="700" fill="#1a1a1a">Vertriebsprozess-</text>
<text x="462" y="323" text-anchor="start" font-size="11" font-weight="700" fill="#1a1a1a">Alignment</text>

<text x="400" y="530" text-anchor="start" font-size="11" font-weight="700" fill="#1a1a1a">Immersiver</text>
<text x="400" y="543" text-anchor="start" font-size="11" font-weight="700" fill="#1a1a1a">„Wow"-Faktor</text>

<text x="160" y="530" text-anchor="end" font-size="11" font-weight="700" fill="#1a1a1a">Fotorealistische</text>
<text x="160" y="543" text-anchor="end" font-size="11" font-weight="700" fill="#1a1a1a">Details</text>

<text x="96" y="310" text-anchor="end" font-size="11" font-weight="700" fill="#1a1a1a">Pricing/</text>
<text x="96" y="323" text-anchor="end" font-size="11" font-weight="700" fill="#1a1a1a">Teile-Logik</text>

<!-- === FLÄCHEN wie im Quell-Screenshot === -->

<!-- CPQ-Anbieter (grau): stark bei Pricing/Teile-Logik, mittel bei Vertriebsprozess, sonst niedrig -->
<!-- ~30% SV, ~58% VPA, ~25% WF, ~25% FD, ~93% PTL -->
<polygon points="280,316 379,338 306,406 254,406 121,318"
         fill="#e8e8e8" fill-opacity="0.3" stroke="#ccc" stroke-width="1.5"/>

<!-- VR/AR-Agentur (orange gestrichelt): stark bei Wow-Faktor, mittel bei Fotoreal, sonst niedrig -->
<!-- ~28% SV, ~30% VPA, ~95% WF, ~58% FD, ~20% PTL -->
<polygon points="280,320 331,353 381,508 219,454 246,359"
         fill="#f97316" fill-opacity="0.06" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3"/>

<!-- viSales (cyan, prominent): stark bei SV + VPA, gut bei FD, mittel bei WF + PTL -->
<!-- ~95% SV, ~85% VPA, ~58% WF, ~60% FD, ~50% PTL -->
<polygon points="280,199 425,323 341,454 217,457 194,342"
         fill="#0891b2" fill-opacity="0.12" stroke="#0891b2" stroke-width="2"/>

<!-- Datenpunkte - viSales -->
<circle cx="280" cy="199" r="4" fill="#0891b2"/>
<circle cx="425" cy="323" r="4" fill="#0891b2"/>
<circle cx="341" cy="454" r="4" fill="#0891b2"/>
<circle cx="217" cy="457" r="4" fill="#0891b2"/>
<circle cx="194" cy="342" r="4" fill="#0891b2"/>

<!-- Datenpunkte - VR/AR -->
<circle cx="280" cy="320" r="3.5" fill="#f97316"/>
<circle cx="331" cy="353" r="3.5" fill="#f97316"/>
<circle cx="381" cy="508" r="3.5" fill="#f97316"/>
<circle cx="219" cy="454" r="3.5" fill="#f97316"/>
<circle cx="246" cy="359" r="3.5" fill="#f97316"/>

<!-- Datenpunkte - CPQ -->
<circle cx="280" cy="316" r="3" fill="#ccc"/>
<circle cx="379" cy="338" r="3" fill="#ccc"/>
<circle cx="306" cy="406" r="3" fill="#ccc"/>
<circle cx="254" cy="406" r="3" fill="#ccc"/>
<circle cx="121" cy="318" r="3" fill="#ccc"/>


<!-- ==================== RECHTE SEITE: ANBIETER-KARTEN ==================== -->

<!-- Karte 1: VR/AR-Agenturen -->
<rect x="600" y="138" width="470" height="98" rx="10"
      fill="#fff" filter="url(#shadow)" stroke="#f0f0f0" stroke-width="1"/>
<rect x="600" y="138" width="4" height="98" rx="2" fill="#f97316"/>

<text x="624" y="163" font-size="15" font-weight="700" fill="#1a1a1a">VR/AR-Agenturen</text>
<rect x="908" y="148" width="142" height="24" rx="12" fill="#fff8f4" stroke="#fbd5bc" stroke-width="1"/>
<text x="979" y="165" text-anchor="middle" font-size="10" font-weight="600" fill="#f97316">Die „Wow"-Anbieter</text>

<text x="624" y="185" font-size="11.5" fill="#555">Fokus auf Engagement und Events. Versteckte Schwäche:</text>
<text x="624" y="202" font-size="11.5" fill="#555">Nur ein Gimmick — hilft nicht bei der Vertriebs-Story.</text>

<!-- Karte 2: Industrielle 3D-Studios -->
<rect x="600" y="256" width="470" height="98" rx="10"
      fill="#fff" filter="url(#shadow)" stroke="#f0f0f0" stroke-width="1"/>
<rect x="600" y="256" width="4" height="98" rx="2" fill="#888"/>

<text x="624" y="281" font-size="15" font-weight="700" fill="#1a1a1a">Industrielle 3D-Studios</text>
<rect x="900" y="266" width="150" height="24" rx="12" fill="#fafafa" stroke="#e8e8e8" stroke-width="1"/>
<text x="975" y="283" text-anchor="middle" font-size="10" font-weight="600" fill="#888">Die „Detail"-Anbieter</text>

<text x="624" y="303" font-size="11.5" fill="#555">Fokus auf fotorealistische Details. Versteckte Schwäche: Statisch;</text>
<text x="624" y="320" font-size="11.5" fill="#555">erklärt nicht, <tspan font-style="italic">wie</tspan> die interne Logik funktioniert.</text>

<!-- Karte 3: CPQ / Konfiguratoren -->
<rect x="600" y="374" width="470" height="98" rx="10"
      fill="#fff" filter="url(#shadow)" stroke="#f0f0f0" stroke-width="1"/>
<rect x="600" y="374" width="4" height="98" rx="2" fill="#ccc"/>

<text x="624" y="399" font-size="15" font-weight="700" fill="#1a1a1a">CPQ / Konfiguratoren</text>
<rect x="900" y="384" width="150" height="24" rx="12" fill="#fafafa" stroke="#e8e8e8" stroke-width="1"/>
<text x="975" y="401" text-anchor="middle" font-size="10" font-weight="600" fill="#888">Die „Logik"-Anbieter</text>

<text x="624" y="421" font-size="11.5" fill="#555">Fokus auf Preisfindung und Teileauswahl. Versteckte Schwäche:</text>
<text x="624" y="438" font-size="11.5" fill="#555">Gut für Angebote, schlecht für kognitive Erklärung.</text>

<!-- Karte 4: viSales (hervorgehoben) -->
<rect x="600" y="492" width="470" height="98" rx="10"
      fill="#f0fdfe" filter="url(#shadow-highlight)" stroke="#0891b2" stroke-width="1.5"/>
<rect x="600" y="492" width="4" height="98" rx="2" fill="#0891b2"/>

<text x="624" y="517" font-size="15" font-weight="700" fill="#0891b2">viSales</text>
<rect x="840" y="502" width="210" height="24" rx="12" fill="#0891b2"/>
<text x="945" y="519" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Der „Understanding"-Anbieter</text>

<text x="624" y="541" font-size="11.5" fill="#0891b2">Fokus auf räumliche Vertriebsinfrastruktur und Systemarchitektur.</text>
<text x="624" y="558" font-size="11.5" fill="#0891b2">Bringt den Käufer sofort zum „Shared Mental Model".</text>

<!-- Fußzeile -->
<line x1="20" y1="598" x2="1080" y2="598" stroke="#f0f0f0" stroke-width="1"/>
<text x="550" y="613" text-anchor="middle"
      font-size="9.5" fill="#bbb" letter-spacing="0.03em">
  Wettbewerbspositionierung · Visuelle B2B-Vertriebskommunikation · visales.de
</text>

</svg>
